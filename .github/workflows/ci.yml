name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    name: Analyze + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install deps
        run: flutter pub get

      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib/ test/
        continue-on-error: true

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test --reporter expanded

  build-apk:
    name: Build release APK
    needs: analyze-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      # If signing secrets are configured, materialise the keystore + key.properties
      # so build.gradle.kts uses the real release signing config instead of the
      # debug fallback. If unset, the build still succeeds — just unsigned (debug).
      - name: Decode signing keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          cat > android/key.properties <<EOF
          storeFile=release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
          echo "Signing key materialised."

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=https://kadunaelectric.cloud/api/v1

      # Also build the App Bundle when on a release tag — Play Store wants .aab.
      - name: Build App Bundle (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          flutter build appbundle --release \
            --dart-define=API_BASE_URL=https://kadunaelectric.cloud/api/v1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hris_mobile-${{ github.sha }}.apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload App Bundle artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: hris_mobile-${{ github.sha }}.aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true
