name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    name: Analyze + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install deps
        run: flutter pub get

      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib/ test/
        continue-on-error: true

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test --reporter expanded

  build-apk:
    name: Build release APK
    needs: analyze-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      # Build a UNSIGNED release APK. To produce a signed APK in this same job,
      # add a key.properties + keystore.jks via a secret (see README) and remove
      # this comment. For now we ship an unsigned debug-keystore APK so the
      # pilot group can install via Firebase App Distribution / sideload.
      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=https://kadunaelectric.cloud/api/v1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hris_mobile-${{ github.sha }}.apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
