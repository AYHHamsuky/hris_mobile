name: hris_mobile
description: "Kaduna Electric HRIS — staff mobile companion"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State + routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # HTTP + storage
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # GPS, camera, media
  geolocator: ^13.0.2
  image_picker: ^1.1.2
  file_picker: ^8.1.4

  # Map (OpenStreetMap, no API key)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # UI helpers
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  url_launcher: ^6.3.1

  # Auth helpers
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
