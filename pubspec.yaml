name: hris_mobile
description: "Kaduna Electric HRIS — staff mobile companion"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State + routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # HTTP + storage
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # GPS, camera, media
  geolocator: ^13.0.2
  image_picker: ^1.1.2
  file_picker: ^8.1.4

  # Map (OpenStreetMap, no API key)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # UI helpers
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  url_launcher: ^6.3.1

  # Auth helpers
  local_auth: ^2.3.0

  # Push notifications
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6

  # Connectivity check for offline draft sync
  connectivity_plus: ^6.1.0

  # Localisation (en + Hausa)
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Brand: launcher icon + splash generation (run via `dart run`).
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/branding/app_icon.png"
  adaptive_icon_background: "#1F8B4C"
  adaptive_icon_foreground: "assets/branding/app_icon.png"

flutter_native_splash:
  color: "#1F8B4C"
  image: "assets/branding/splash_logo.png"
  android_12:
    color: "#1F8B4C"
    image: "assets/branding/splash_logo.png"
  ios_content_mode: center
  fullscreen: false

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/branding/
